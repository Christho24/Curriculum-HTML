<!DOCTYPE html>
<html lang="es">
	<head>
		<link rel="stylesheet" href="style.css">	<!-- esto "linkea" el estilo con la hoja correspondiente-->
		<script src="script.js" defer></script>		<!-- para tener los SCRIPTS en otro archivo, como con el CSS-->
		<h1>
			Hola, esto es un título
		</h1>
		<h3>
			Esto es otro título
		</h3>
	</head>
	<body>
		<p>
		Y esto es un párrafo dentro el cuerpo.
		</p>
		<div>
			<mi-saludo></mi-saludo>					<!-- esto es la llamada a un componente-->
		</div>
	</body>
</html>

<script>
	// Crear la lógica (Javascript)
	class MiComponente extends HTMLElement {
		connectedCallback() {
			this.innerHTML = `<p>Hola, esto es un componente!</p>`;
		}
	}

	// Registrar la lógica (debe tener "-" en vez de espacios)
	customElements.define('mi-saludo', MiComponente);

	// Usar funciones
	function mensaje() {
		alert("Hola, soy el JavaScript interno!");
	}

	// Escribir en consola
	console.log("Muchas cosas!");

</script>
